<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="scripts/javascript.js" defer></script>
    <link rel="stylesheet" href="styles/styles.css">
    <title>Document</title>
</head>
<body>
    <div class="container">   
        <div class="buttons">
            <button class="rock">Rock</button>
            <button class="paper">Paper</button>
            <button class="scissors">Scissors</button>
        </div>

        <div class="selection">
            <div class="ChoiceContainer">
                Your choice:
                <div class="humanChoice">
                    Waiting on selection
                </div>
            </div>
            <div class="ChoiceContainer">
                Computer choice:
                <div class="computerChoice">
                    Waiting on selection
                </div>
            </div>
        </div>
        <div class="outcome">
            Outcome:
        </div>
        <div class="score">
            
            <div class="human">
                0
            </div>
            <div class="comp">
                0
            </div>
        </div>
    </div>

</html>
